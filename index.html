<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPU / OS Compatibility Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-cpu"></i> CPU / OS Compatibility Search
      </span>
    </div>
  </nav>

  <main class="container my-4">
    <!-- Loading indicator -->
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Loading CPU and OS data...</p>
    </div>

    <!-- Error display -->
    <div id="load-error" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-triangle"></i>
      <span id="load-error-msg"></span>
    </div>

    <!-- Main content (hidden until loaded) -->
    <div id="main-content" class="d-none">

      <!-- Tabs -->
      <ul class="nav nav-tabs" id="searchTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="cpu-tab" data-bs-toggle="tab"
                  data-bs-target="#cpu-pane" type="button" role="tab"
                  aria-controls="cpu-pane" aria-selected="true">
            <i class="bi bi-cpu"></i> Search by CPU
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="os-tab" data-bs-toggle="tab"
                  data-bs-target="#os-pane" type="button" role="tab"
                  aria-controls="os-pane" aria-selected="false">
            <i class="bi bi-windows"></i> Search by OS
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="cpuos-tab" data-bs-toggle="tab"
                  data-bs-target="#cpuos-pane" type="button" role="tab"
                  aria-controls="cpuos-pane" aria-selected="false">
            <i class="bi bi-search"></i> Search by CPU + OS
          </button>
        </li>
      </ul>

      <div class="tab-content pt-3" id="searchTabContent">

        <!-- Search by CPU Tab -->
        <div class="tab-pane fade show active" id="cpu-pane" role="tabpanel" aria-labelledby="cpu-tab">
          <div class="row">
            <div class="col-lg-8 mx-auto">
              <div class="mb-3 position-relative">
                <label for="cpu-search" class="form-label fw-bold">Enter CPU model name</label>
                <input type="text" class="form-control form-control-lg" id="cpu-search"
                       placeholder="e.g. i7-12700K, Ryzen 7 5800X, Xeon E-2388G..."
                       autocomplete="off">
                <div id="cpu-autocomplete" class="autocomplete-dropdown d-none"></div>
              </div>

              <!-- CPU Info Card -->
              <div id="cpu-info" class="d-none">
                <div class="card mb-3">
                  <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0" id="cpu-name"></h5>
                    <span class="badge" id="cpu-level-badge"></span>
                  </div>
                  <div class="card-body">
                    <div class="row" id="cpu-specs"></div>
                    <div class="mt-2" id="cpu-features"></div>
                  </div>
                </div>

                <!-- Compatibility Results -->
                <h5 class="mb-3">OS Compatibility</h5>
                <div id="cpu-compat-results"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Search by OS Tab -->
        <div class="tab-pane fade" id="os-pane" role="tabpanel" aria-labelledby="os-tab">
          <div class="row">
            <div class="col-lg-8 mx-auto">
              <div class="mb-3">
                <label for="os-select" class="form-label fw-bold">Select an operating system</label>
                <select class="form-select form-select-lg" id="os-select">
                  <option value="">-- Choose an OS --</option>
                </select>
              </div>

              <!-- OS Info Card -->
              <div id="os-info" class="d-none">
                <div class="card mb-3">
                  <div class="card-header">
                    <h5 class="mb-0" id="os-name"></h5>
                  </div>
                  <div class="card-body" id="os-details"></div>
                </div>

                <!-- Filter & Stats -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h5 class="mb-0">Compatible CPUs</h5>
                  <span class="text-muted" id="os-cpu-count"></span>
                </div>
                <div class="mb-3">
                  <input type="text" class="form-control" id="os-cpu-filter"
                         placeholder="Filter CPUs...">
                </div>
                <div id="os-compat-results"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Search by CPU + OS Tab -->
        <div class="tab-pane fade" id="cpuos-pane" role="tabpanel" aria-labelledby="cpuos-tab">
          <div class="row">
            <div class="col-lg-8 mx-auto">
              <div class="mb-3 position-relative">
                <label for="cpuos-cpu-search" class="form-label fw-bold">Enter CPU model name</label>
                <input type="text" class="form-control form-control-lg" id="cpuos-cpu-search"
                       placeholder="e.g. i7-12700K, Ryzen 7 5800X..."
                       autocomplete="off">
                <div id="cpuos-cpu-autocomplete" class="autocomplete-dropdown d-none"></div>
              </div>
              <div class="mb-3">
                <label for="cpuos-os-select" class="form-label fw-bold">Select an operating system</label>
                <select class="form-select form-select-lg" id="cpuos-os-select">
                  <option value="">-- Choose an OS --</option>
                </select>
              </div>
              <div id="cpuos-result"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Data metadata footer -->
    <div id="data-meta" class="d-none text-center text-muted small mt-4 pt-3 border-top">
      Data last updated: <span id="data-date"></span> |
      <span id="data-counts"></span>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/search-engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
